<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Onur Eren Taşcı — Mobile Engineer</title>
  <desc id="desc">Dark editorial profile banner with amber accents, mobile interface geometry and connected AI nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08090D"/>
      <stop offset="0.58" stop-color="#0B0D13"/>
      <stop offset="1" stop-color="#12100B"/>
    </linearGradient>
    <linearGradient id="amber" x1="820" y1="56" x2="1090" y2="306" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB000"/>
      <stop offset="1" stop-color="#F27A00"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#FFFFFF" stroke-opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" stroke="#FFFFFF" stroke-opacity="0.09"/>
